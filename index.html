<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลา อบต.ดงตะงาว</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --primary: #004aad; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: 0.5s; }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--primary); }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 18px; box-sizing: border-box; }
        .info { margin-bottom: 15px; padding: 15px; background: #eef2f7; border-radius: 10px; }
        #displayTime { font-size: 28px; font-weight: bold; color: var(--primary); display: block; }
        #scanner-container { width: 100%; height: 250px; background: #000; border-radius: 15px; overflow: hidden; position: relative; margin-top: 10px; }
        #canvas { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <h2>อบต.ดงตะงาว</h2>
        <p>กำลังเตรียมระบบบันทึกเวลา...</p>
    </div>

    <div class="container">
        <div id="login-page">
            <h3>กรอกรหัสประจำตัว</h3>
            <input type="text" id="empId" placeholder="ตัวอย่าง: ป01">
            <button class="btn btn-out" onclick="login()">ยืนยันรายชื่อ</button>
        </div>

        <div id="main-page" class="hidden">
            <div class="info">
                <p>สวัสดี: <span id="displayName" style="font-weight:bold;">...</span></p>
                <span id="displayTime">00:00:00</span>
            </div>
            <button class="btn btn-in" onclick="startScanner('IN')">สแกน QR เพื่อเข้างาน</button>
            <button class="btn btn-out" onclick="startScanner('OUT')">สแกน QR เพื่อออกงาน</button>
        </div>

        <div id="scanner-page" class="hidden">
            <h3>กรุณาส่องไปที่ QR Code</h3>
            <div id="scanner-container">
                <canvas id="canvas"></canvas>
            </div>
            <p id="scanStatus">กำลังเปิดกล้อง...</p>
            <button class="btn btn-out" style="background:#666" onclick="location.reload()">ยกเลิก</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx_Gq2Cl2_XU8T4YumgEZiPl4zsdLuyv58PlZeeFWrrXXg0T1ODnSyRBskdEFDu9aok/exec";
        const QR_SECRET = "อบต.ดงตะงาว"; 
        let currentId = "", currentType = "", video = document.createElement("video"), scanning = false;

        window.onload = () => {
            setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden'); }, 2000);
            setInterval(() => { 
                document.getElementById('displayTime').innerText = new Date().toLocaleTimeString('th-TH');
            }, 1000);
        };

        function login() {
            currentId = document.getElementById('empId').value.trim();
            if(!currentId) return alert("กรุณากรอกรหัส");
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-page').classList.remove('hidden');
            
            fetch(WEB_APP_URL + "?id=" + encodeURIComponent(currentId) + "&type=CHECK_NAME")
            .then(res => res.text()).then(name => {
                document.getElementById('displayName').innerText = "รหัส " + currentId + " " + name;
            });
        }

        function startScanner(type) {
            currentType = type;
            document.getElementById('main-page').classList.add('hidden');
            document.getElementById('scanner-page').classList.remove('hidden');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                scanning = true;
                requestAnimationFrame(tick);
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                const canvasElement = document.getElementById("canvas");
                const canvas = canvasElement.getContext("2d");
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    if (code.data === QR_SECRET) {
                        scanning = false;
                        video.srcObject.getTracks().forEach(track => track.stop());
                        document.getElementById('scanStatus').innerText = "สแกนสำเร็จ! กำลังบันทึก...";
                        sendData();
                    }
                }
            }
            if(scanning) requestAnimationFrame(tick);
        }

        function sendData() {
            fetch(WEB_APP_URL + "?id=" + encodeURIComponent(currentId) + "&type=" + currentType)
            .then(res => res.text()).then(data => {
                alert(data);
                location.reload();
            });
        }
    </script>
</body>
</html>
