<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลา อบต.ดงตะงาว</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --primary: #004aad; --success: #2ecc71; --danger: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; overflow: hidden; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; box-sizing: border-box; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: 0.5s; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 15px; text-align: center; font-size: 20px; outline: none; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        .btn-login { background: var(--primary); }
        .btn-in { background: var(--success); }
        .btn-out { background: #34495e; }
        .btn-back { background: none; border: none; color: #64748b; font-size: 14px; margin-top: 15px; cursor: pointer; text-decoration: underline; padding: 5px; }
        .info-box { background: #f8fafc; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        .pos-text { color: #64748b; font-size: 16px; display: block; margin-top: 5px; }
        #displayTime { font-size: 28px; font-weight: bold; color: var(--primary); display: block; margin-top: 10px; }
        #scanner-container { width: 100%; height: 250px; background: #000; border-radius: 20px; overflow: hidden; margin: 15px auto; border: 4px solid white; box-sizing: border-box; }
        #timer-text { color: var(--danger); font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <h2 style="color: var(--primary); margin-bottom: 5px;">อบต.ดงตะงาว</h2>
        <p>ระบบบันทึกเวลาเข้างาน/ออกงาน</p>
    </div>

    <div class="container">
        <div id="login-page">
            <h3 style="margin-top:0;">ยินดีต้อนรับ</h3>
            <p style="color:#666;">กรุณากรอกรหัสประจำตัวเพื่อเริ่มต้น</p>
            <input type="text" id="empId" placeholder="เช่น ป01">
            <button class="btn-main btn-login" onclick="login()">เข้าสู่ระบบ</button>
        </div>

        <div id="main-page" class="hidden">
            <div class="info-box">
                <span id="displayName" style="font-weight:bold; font-size: 20px;">รหัส: ...</span>
                <span id="displayPos" class="pos-text">ตำแหน่ง: ...</span>
                <span id="displayTime">00:00:00</span>
            </div>
            <button class="btn-main btn-in" onclick="startScanner('IN')"><span>📍 บันทึกเข้างาน</span></button>
            <button class="btn-main btn-out" onclick="startScanner('OUT')"><span>🏠 บันทึกออกงาน</span></button>
            <button class="btn-back" onclick="location.reload()">ย้อนกลับ</button>
        </div>

        <div id="scanner-page" class="hidden">
            <h3>สแกนภายใน <span id="timer-text">10</span> วิ</h3>
            <div id="scanner-container"><canvas id="canvas"></canvas></div>
            <p id="scanStatus" style="margin-top:15px; color:#666;">กำลังรอ QR Code...</p>
            <button class="btn-main" style="background:#94a3b8; padding:12px; font-size:16px;" onclick="location.reload()">ยกเลิก</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx_Gq2Cl2_XU8T4YumgEZiPl4zsdLuyv58PlZeeFWrrXXg0T1ODnSyRBskdEFDu9aok/exec";
        const QR_SECRET = "อบต.ดงตะงาว"; 
        const targetLat = 14.610752; 
        const targetLng = 100.581508; 
        const maxDistance = 30; // ขยายเป็น 30 เมตรเพื่อความลื่นไหลครับ

        let currentId = "", currentType = "", video = document.createElement("video"), scanning = false;
        let countdown;

        window.onload = () => {
            setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden'); }, 2000);
            setInterval(() => { document.getElementById('displayTime').innerText = new Date().toLocaleTimeString('th-TH'); }, 1000);
        };

        function login() {
            currentId = document.getElementById('empId').value.trim();
            if(!currentId) return alert("กรุณากรอกรหัส");
            fetch(WEB_APP_URL + "?id=" + encodeURIComponent(currentId) + "&type=CHECK_NAME")
            .then(res => res.text()).then(data => {
                if(data === "ไม่พบรหัสพนักงาน") return alert(data);
                const parts = data.split("|");
                document.getElementById('displayName').innerText = "รหัส " + currentId + " " + parts[0];
                document.getElementById('displayPos').innerText = "ตำแหน่ง: " + (parts[1] || "-");
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
            });
        }

        function startScanner(type) {
            currentType = type;
            document.getElementById('main-page').classList.add('hidden');
            document.getElementById('scanner-page').classList.remove('hidden');
            let timeLeft = 10;
            document.getElementById('timer-text').innerText = timeLeft;
            countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(countdown); alert("หมดเวลาสแกนครับ"); location.reload(); }
            }, 1000);

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                scanning = true;
                requestAnimationFrame(tick);
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                const canvasElement = document.getElementById("canvas");
                const canvas = canvasElement.getContext("2d");
                canvasElement.height = video.videoHeight; canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(canvas.getImageData(0, 0, canvasElement.width, canvasElement.height).data, canvasElement.width, canvasElement.height);
                if (code && code.data === QR_SECRET) {
                    clearInterval(countdown); scanning = false;
                    video.srcObject.getTracks().forEach(track => track.stop());
                    checkLocationAndSend();
                }
            }
            if(scanning) requestAnimationFrame(tick);
        }

        function checkLocationAndSend() {
            document.getElementById('scanStatus').innerText = "ตรวจสอบพิกัด GPS...";
            navigator.geolocation.getCurrentPosition(function(pos) {
                const R = 6371e3;
                const p1 = pos.coords.latitude * Math.PI/180, p2 = targetLat * Math.PI/180;
                const dp = (targetLat-pos.coords.latitude) * Math.PI/180, dl = (targetLng-pos.coords.longitude) * Math.PI/180;
                const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
                const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

                if (dist > maxDistance) {
                    alert("⚠️ อยู่นอกพื้นที่ อบต. (ห่าง " + Math.round(dist) + " ม.)");
                    location.reload();
                } else {
                    sendData();
                }
            }, () => { alert("กรุณาเปิด GPS และอนุญาตสิทธิ์ตำแหน่งครับ"); location.reload(); }, 
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }

        function sendData() {
            document.getElementById('scanStatus').innerText = "กำลังส่งข้อมูลและรูปถ่าย...";
            const canvasElement = document.getElementById("canvas");
            const imageData = canvasElement.toDataURL("image/jpeg", 0.4); 

            const formData = new URLSearchParams();
            formData.append("id", currentId);
            formData.append("type", currentType);
            formData.append("image", imageData);

            fetch(WEB_APP_URL, { method: "POST", body: formData, mode: "no-cors" })
            .then(() => {
                alert("✅ บันทึกสำเร็จ (ถ่ายรูปแล้ว)");
                location.reload();
            })
            .catch(err => { alert("ผิดพลาด: " + err); location.reload(); });
        }
    </script>
</body>
</html>
